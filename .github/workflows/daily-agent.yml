name: Daily AI Agent

on:
  # Run automatically every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run"
        required: false
        default: "Manual trigger"

jobs:
  run-daily-agent:
    name: Run Daily AI Agent
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit files

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Step 4: Run the AI Agent
      - name: Run Daily AI Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          echo "Starting Daily AI Agent..."
          python agent.py
          echo "Agent completed!"

      # Step 5: Show summary
      - name: Job Summary
        if: always()
        run: |
          echo "## Daily AI Agent Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +%H:%M:%S) UTC" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
